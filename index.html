<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文學習閱讀助手</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            line-height: 1.6;
            margin: 20px;
            background-color: #f4f7f6;
            color: #333;
        }
        .container {
            /* 為了容納左右雙欄，將最大寬度加寬 */
            max-width: 1400px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        
        /* 新增：左右排版的主容器 */
        .main-layout {
            display: flex;
            gap: 25px;
            align-items: flex-start;
            margin-top: 20px;
        }
        .left-column {
            flex: 6;
            min-width: 0;
        }
        .right-column {
            flex: 4;
            min-width: 0;
            /* 讓右邊區塊在向下捲動時固定在畫面上方，並可獨立捲動 */
            position: sticky;
            top: 20px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            padding-right: 5px; /* 預留捲軸空間 */
        }

        /* 針對小螢幕（如手機、平板）自動切換回上下排版 */
        @media (max-width: 900px) {
            .main-layout {
                flex-direction: column;
            }
            .left-column, .right-column {
                flex: 1;
                width: 100%;
            }
            .right-column {
                position: static;
                max-height: none;
                overflow-y: visible;
            }
        }

        .settings-panel {
            background-color: #ffffff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #dee2e6;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .setting-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 16px;
        }
        button {
            padding: 8px 16px;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            transition: 0.2s;
        }
        button:hover {
            background-color: #0056b3;
        }
        #article-display {
            margin-top: 25px;
        }
        .paragraph-card {
            background-color: #fff;
            border: 1px solid #e3e6f0;
            border-left: 4px solid #4e73df;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .para-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
        }
        .para-title {
            font-weight: bold;
            color: #6c757d;
            font-size: 0.9em;
        }
        .para-play-btn {
            background-color: #17a2b8;
            font-size: 0.85em;
            padding: 5px 12px;
        }
        .para-play-btn:hover {
            background-color: #138496;
        }
        .article-paragraph {
            margin: 0;
            font-size: 1.25em;
            line-height: 1.8;
        }
        .word {
            cursor: pointer;
            padding: 1px 3px;
            border-radius: 3px;
            transition: 0.2s;
        }
        .word:hover {
            background-color: #d1ecf1;
        }
        .active-word {
            background-color: #ffeeba;
            border-bottom: 2px solid #ffc107;
        }
        .action-panel {
            padding: 20px;
            border: 1px solid #bee5eb;
            background-color: #e2f3f5;
            border-radius: 8px;
            display: none;
            margin-bottom: 30px;
        }
        .action-panel h3 {
            margin: 0 0 10px 0;
            color: #0c5460;
        }
        .info-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 12px 10px;
            margin-bottom: 15px;
            align-items: baseline;
        }
        .vocab-list h3 {
            margin-top: 0;
            border-bottom: 2px solid #007BFF;
            padding-bottom: 10px;
            display: inline-block;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            font-size: 0.95em;
        }
        th, td {
            border: 1px solid #eee;
            padding: 12px;
            text-align: left;
            vertical-align: top;
        }
        th {
            background-color: #f8f9fa;
            color: #495057;
        }
        .dict-btn {
            color: #007BFF;
            text-decoration: none;
            font-size: 0.9em;
            display: block;
            margin-top: 5px;
        }
        .dict-btn:hover {
            text-decoration: underline;
        }
        .loading-text {
            color: #888;
            font-size: 0.9em;
        }
        .example-text {
            color: #28a745;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>英文閱讀助手</h2>

    <div class="main-layout">
        <div class="left-column">
            <div class="settings-panel">
                <div class="setting-group">
                    <label>語音選單：</label>
                    <select id="voice-select"></select>
                </div>
                <div class="setting-group">
                    <label>語速：</label>
                    <input type="range" id="rate-input" min="0.5" max="1.5" step="0.1" value="1">
                    <span id="rate-val">1.0</span>
                </div>
                <button onclick="stopSpeaking()" style="background-color: #dc3545;">⏹ 停止發音</button>
            </div>
            
            <textarea id="text-input" placeholder="請貼上英文文章，使用連續兩個換行鍵（Enter）來自動分段..."></textarea>
            <button onclick="processText()">載入文章內容</button>

            <div id="article-display"></div>
        </div>

        <div class="right-column">
            <div id="action-panel" class="action-panel">
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <h3 id="selected-word">單字</h3>
                    <button onclick="speakText(currentWord)">🔊 朗讀單字</button>
                </div>
                
                <div class="info-grid">
                    <strong>詞性：</strong> <span id="word-pos">等待選擇...</span>
                    <strong>翻譯：</strong> <span id="word-explanation">等待選擇...</span>
                    <strong>例句/用法：</strong> <span id="word-usage" class="example-text">等待選擇...</span>
                    <strong>字典：</strong> <a id="dict-link" href="#" target="_blank" style="color:#0056b3;">劍橋中英字典 ↗</a>
                </div>

                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <label>個人備註：</label>
                    <input type="text" id="word-note" style="padding: 8px; border:1px solid #ccc; border-radius:4px;" placeholder="輸入個人筆記...">
                    <button onclick="addToVocab()" style="background-color: #28a745; width: 100%;">加入單字表</button>
                </div>
            </div>

            <div class="vocab-list">
                <h3>我的單字表</h3>
                <table id="vocab-table">
                    <thead>
                        <tr>
                            <th style="width: 25%;">單字與操作</th>
                            <th style="width: 35%;">解釋與詞性</th>
                            <th style="width: 40%;">備註與例句</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let currentWord = '';
    let currentTranslation = '';
    let currentPos = '';
    let currentExample = '';
    let voices = [];

    // 初始化語音：限定特定 Google 語音
    function initVoices() {
        let allVoices = speechSynthesis.getVoices();
        const targetNames = [
            'Google US English', 
            'Google UK English Female', 
            'Google UK English Male'
        ];
        
        voices = allVoices.filter(v => targetNames.includes(v.name));
        if (voices.length === 0) {
            voices = allVoices.filter(v => v.lang.startsWith('en'));
        }

        const select = document.getElementById('voice-select');
        select.innerHTML = voices.map((v, i) => `<option value="${i}">${v.name}</option>`).join('');
    }

    window.speechSynthesis.onvoiceschanged = initVoices;
    initVoices();

    document.getElementById('rate-input').oninput = function() {
        document.getElementById('rate-val').innerText = parseFloat(this.value).toFixed(1);
    };

    // 處理文章
    function processText() {
        const input = document.getElementById('text-input').value;
        const display = document.getElementById('article-display');
        if (!input.trim()) return;

        const paragraphs = input.split(/\n\s*\n/).filter(p => p.trim() !== '');
        
        display.innerHTML = paragraphs.map((p, index) => {
            let wrapped = p.replace(/([a-zA-Z]+)/g, '<span class="word" onclick="selectWord(this, \'$1\')">$1</span>');
            wrapped = wrapped.replace(/\n/g, '<br>');

            return `
            <div class="paragraph-card">
                <div class="para-header">
                    <span class="para-title">段落 ${index + 1}</span>
                    <button class="para-play-btn" onclick="speakParagraph(${index})">🔊 朗讀整段</button>
                </div>
                <p class="article-paragraph" id="para-text-${index}">${wrapped}</p>
            </div>`;
        }).join('');
        
        document.getElementById('action-panel').style.display = 'block';
        // 初次載入時重置面板
        document.getElementById('selected-word').innerText = '請點選左側單字';
        document.getElementById('word-pos').innerText = '-';
        document.getElementById('word-explanation').innerText = '-';
        document.getElementById('word-usage').innerText = '-';
    }

    // 選擇單字
    async function selectWord(el, word) {
        document.querySelectorAll('.word').forEach(w => w.classList.remove('active-word'));
        el.classList.add('active-word');

        currentWord = word.toLowerCase();
        document.getElementById('selected-word').innerText = currentWord;
        document.getElementById('action-panel').style.display = 'block';
        document.getElementById('word-note').value = '';
        
        const dictUrl = `https://dictionary.cambridge.org/zht/dictionary/english-chinese-traditional/${currentWord}`;
        document.getElementById('dict-link').href = dictUrl;

        document.getElementById('word-pos').innerHTML = '<span class="loading-text">查詢中...</span>';
        document.getElementById('word-explanation').innerHTML = '<span class="loading-text">查詢中...</span>';
        document.getElementById('word-usage').innerHTML = '<span class="loading-text">查詢中...</span>';

        speakText(currentWord);
        
        fetchWordDetails(currentWord);
        fetchTrans(currentWord);
    }

    const posAbbr = {
        "noun": "n.", "verb": "v.", "adjective": "adj.", "adverb": "adv.",
        "pronoun": "pron.", "preposition": "prep.", "conjunction": "conj.", "interjection": "int."
    };

    async function fetchWordDetails(word) {
        try {
            const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
            const data = await res.json();
            
            if (data[0] && data[0].meanings) {
                const types = [...new Set(data[0].meanings.map(m => m.partOfSpeech.toLowerCase()))];
                currentPos = types.map(t => posAbbr[t] || t).join(', ');
                document.getElementById('word-pos').innerText = currentPos;

                let foundExample = '';
                for (let meaning of data[0].meanings) {
                    for (let def of meaning.definitions) {
                        if (def.example) {
                            foundExample = def.example;
                            break;
                        }
                    }
                    if (foundExample) break;
                }
                
                currentExample = foundExample || '無提供例句';
                document.getElementById('word-usage').innerText = currentExample;
            } else {
                currentPos = '-';
                currentExample = '-';
                document.getElementById('word-pos').innerText = '無資料';
                document.getElementById('word-usage').innerText = '無資料';
            }
        } catch {
            currentPos = '-';
            currentExample = '-';
            document.getElementById('word-pos').innerText = '讀取失敗';
            document.getElementById('word-usage').innerText = '讀取失敗';
        }
    }

    async function fetchTrans(word) {
        try {
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${word}&langpair=en|zh-TW`);
            const data = await res.json();
            currentTranslation = data.responseData.translatedText;
            document.getElementById('word-explanation').innerText = currentTranslation;
        } catch {
            currentTranslation = '翻譯失敗';
            document.getElementById('word-explanation').innerText = currentTranslation;
        }
    }

    function speakText(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        const voiceIdx = document.getElementById('voice-select').value;
        if (voices[voiceIdx]) msg.voice = voices[voiceIdx];
        msg.rate = parseFloat(document.getElementById('rate-input').value);
        window.speechSynthesis.speak(msg);
    }

    function stopSpeaking() {
        window.speechSynthesis.cancel();
    }

    function speakParagraph(index) {
        const paraElement = document.getElementById(`para-text-${index}`);
        if (paraElement) {
            speakText(paraElement.innerText);
        }
    }

    function addToVocab() {
        if (!currentWord) return;
        const tbody = document.querySelector('#vocab-table tbody');
        const note = document.getElementById('word-note').value || '無';
        const dictUrl = `https://dictionary.cambridge.org/zht/dictionary/english-chinese-traditional/${currentWord}`;

        // 為了適應右側較窄的空間，將表格簡化合併為三個主要欄位
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>
                <strong>${currentWord}</strong><br>
                <button onclick="speakText('${currentWord}')" style="padding:2px 6px; font-size:12px; margin-top:5px;">🔊 發音</button>
            </td>
            <td>
                <span style="color: #666; font-size: 0.9em;">(${currentPos})</span><br>
                ${currentTranslation}<br>
                <a href="${dictUrl}" target="_blank" class="dict-btn">檢視字典</a>
            </td>
            <td>
                <strong style="font-size: 0.9em;">備註：</strong>${note}<br>
                <div class="example-text" style="margin-top: 5px; font-size: 0.9em;">${currentExample}</div>
            </td>
        `;
        tbody.prepend(tr); 
        document.getElementById('word-note').value = '';
    }
</script>

</body>
</html>
