<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隨手筆記小幫手</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        textarea { width: 100%; height: 100px; padding: 10px; margin-bottom: 10px; }
        button { padding: 10px 20px; cursor: pointer; margin-right: 5px; }
        #history { margin-top: 20px; }
        li { margin-bottom: 5px; }
    </style>
</head>
<body>
    <h1>隨手筆記小幫手</h1>
    <textarea id="content" placeholder="輸入任何想記錄或朗讀的文字..."></textarea>
    <br>
    <button onclick="saveAndSpeak()">記錄並朗讀</button>
    <button onclick="clearHistory()" style="background: #ffcccc;">清空紀錄</button>

    <div id="history">
        <h3>歷史紀錄</h3>
        <ul id="historyList"></ul>
    </div>

    <script>
        function saveAndSpeak() {
            const text = document.getElementById("content").value.trim();
            if (!text) return alert("請輸入內容");

            // 1. 朗讀
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW'; // 設定為中文
            window.speechSynthesis.speak(msg);

            // 2. 紀錄 (存入 LocalStorage)
            let history = JSON.parse(localStorage.getItem('myNotes') || '[]');
            history.unshift(text); // 將新內容放在最前面
            localStorage.setItem('myNotes', JSON.stringify(history));

            document.getElementById("content").value = ""; // 清空輸入框
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            const history = JSON.parse(localStorage.getItem('myNotes') || '[]');
            list.innerHTML = history.map(item => `<li>${item}</li>`).join('');
        }

        function clearHistory() {
            localStorage.removeItem('myNotes');
            renderHistory();
        }

        renderHistory(); // 初始化顯示
    </script>
</body>
</html>
